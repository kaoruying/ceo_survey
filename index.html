<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K PLUS CEO講堂｜報名成功查詢與課前問卷</title>
  <style>
    :root {
      --kgi-blue: #005BAC;
      --deep-blue: #073C6D;
      --ink: #17324D;
      --muted: #667085;
      --line: #D8E2EE;
      --bg: #F5F8FC;
      --card: rgba(255,255,255,.94);
      --gold: #C59A45;
      --gold-soft: #F7E6BD;
      --danger: #C53333;
      --ok: #16805B;
      --shadow: 0 18px 50px rgba(7,60,109,.12);
      --radius-xl: 28px;
      --radius-md: 18px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, rgba(197,154,69,.18), transparent 28%),
        radial-gradient(circle at 92% 10%, rgba(0,91,172,.14), transparent 31%),
        linear-gradient(135deg, #FFFFFF 0%, var(--bg) 55%, #EDF5FF 100%);
      min-height: 100vh;
    }
    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
    }
    .brand { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .brand img { display: block; height: 34px; width: auto; object-fit: contain; }
    .brand .divider { color: #A9B6C5; font-weight: 800; }
    .tag {
      padding: 9px 14px;
      border: 1px solid rgba(0,91,172,.16);
      background: rgba(255,255,255,.72);
      border-radius: 999px;
      color: var(--deep-blue);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }
    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(7,60,109,.98) 0%, rgba(0,91,172,.92) 58%, rgba(19,93,150,.82) 100%);
      color: #fff;
      box-shadow: var(--shadow);
      padding: 34px;
      margin-bottom: 20px;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: -55% -15% auto auto;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(247,230,189,.48), transparent 62%);
      opacity: .75;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -130px auto;
      width: 370px;
      height: 370px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.18);
    }
    .hero-content { position: relative; z-index: 1; max-width: 760px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #F7E6BD;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 58px);
      line-height: 1.05;
      letter-spacing: -.03em;
      font-weight: 950;
    }
    .hero p {
      margin: 14px 0 0;
      max-width: 680px;
      color: rgba(255,255,255,.84);
      line-height: 1.75;
      font-size: 16px;
    }
    .query-card, .result-card, .form-card {
      background: var(--card);
      border: 1px solid rgba(216,226,238,.8);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(14px);
      margin-top: 18px;
    }
    .query-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }
    .field label {
      display: block;
      font-weight: 900;
      color: var(--deep-blue);
      margin-bottom: 8px;
      font-size: 15px;
    }
    .field label span { color: var(--danger); }
    input, select, textarea {
      width: 100%;
      border: 1px solid #CBD7E4;
      background: #fff;
      border-radius: 16px;
      padding: 14px 15px;
      font: inherit;
      color: var(--ink);
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(0,91,172,.75);
      box-shadow: 0 0 0 4px rgba(0,91,172,.12);
    }
    select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--deep-blue) 50%), linear-gradient(135deg, var(--deep-blue) 50%, transparent 50%);
      background-position: calc(100% - 20px) 50%, calc(100% - 14px) 50%;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }
    input:disabled, select:disabled {
      background: #F4F7FA;
      color: #8A9AAF;
      cursor: not-allowed;
    }
    .region-field {
      margin-bottom: 16px;
    }
    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.7;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--kgi-blue), var(--deep-blue));
      color: white;
      padding: 14px 22px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(0,91,172,.2);
      transition: transform .15s, opacity .15s;
      white-space: nowrap;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .ghost-btn {
      background: #fff;
      color: var(--deep-blue);
      border: 1px solid #CBD7E4;
      box-shadow: none;
      padding: 10px 14px;
      border-radius: 12px;
    }
    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .lookup-message {
      margin-top: 14px;
      padding: 13px 15px;
      border-radius: 16px;
      display: none;
      line-height: 1.6;
      font-size: 14px;
    }
    .lookup-message.warn {
      display: block;
      background: #FFF7E8;
      border: 1px solid #F3D49B;
      color: #7A4D00;
    }
    .lookup-message.ok {
      display: block;
      background: #F0FAF6;
      border: 1px solid #B9E6D3;
      color: #11684B;
    }
    .candidate-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .success-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }
    .success-title {
      margin: 0;
      color: var(--deep-blue);
      font-size: clamp(25px, 5vw, 38px);
      line-height: 1.18;
      font-weight: 950;
    }
    .success-sub {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .check {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #1B9C72, #137356);
      color: white;
      font-size: 26px;
      font-weight: 900;
      flex: 0 0 auto;
      box-shadow: 0 12px 30px rgba(27,156,114,.22);
    }
    .profile {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .profile-item {
      background: #F8FBFF;
      border: 1px solid #E0E9F3;
      border-radius: 18px;
      padding: 13px 14px;
    }
    .profile-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 4px;
    }
    .profile-value {
      color: var(--deep-blue);
      font-weight: 900;
      font-size: 17px;
    }
    .session-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .session-card {
      overflow: hidden;
      border-radius: 22px;
      background: #fff;
      border: 1px solid #DDE7F1;
      box-shadow: 0 12px 34px rgba(7,60,109,.08);
    }
    .session-top {
      padding: 18px 18px 16px;
      color: white;
      background: linear-gradient(135deg, #073C6D, #005BAC);
      position: relative;
    }
    .session-top .pill {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(247,230,189,.18);
      color: #F7E6BD;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .session-top h3 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 950;
      line-height: 1.16;
    }
    .session-topic {
      margin: 0;
      color: rgba(255,255,255,.88);
      line-height: 1.6;
      font-size: 14px;
      font-weight: 700;
    }
    .session-body { padding: 18px; }
    .info-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #EDF2F7;
      line-height: 1.55;
    }
    .info-row:last-child { border-bottom: 0; }
    .info-key { color: var(--muted); font-weight: 900; }
    .info-val { color: var(--ink); font-weight: 800; }
    .section-title {
      margin: 18px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--deep-blue);
      font-size: 18px;
      font-weight: 950;
    }
    .section-title::before {
      content: "";
      width: 8px;
      height: 22px;
      border-radius: 99px;
      background: var(--gold);
      display: inline-block;
    }
    .intro {
      color: #4B5F73;
      line-height: 1.8;
      margin: 0;
      font-size: 15px;
    }
    ul.outline {
      margin: 10px 0 0;
      padding-left: 1.15em;
      color: #36516A;
      line-height: 1.75;
      font-size: 15px;
    }
    .hidden { display: none !important; }
    .form-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    .form-head h2 {
      margin: 0;
      color: var(--deep-blue);
      font-size: 28px;
      font-weight: 950;
    }
    .form-head p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .fields {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    .read-only-line {
      background: #F8FBFF;
      border: 1px solid #E0E9F3;
      border-radius: 18px;
      padding: 14px 16px;
      color: var(--deep-blue);
      font-weight: 900;
      line-height: 1.65;
    }
    .status {
      margin-top: 12px;
      line-height: 1.6;
      color: var(--muted);
      font-size: 14px;
    }
    .status.ok {
      color: var(--ok);
      font-weight: 900;
    }
    .status.warn {
      color: #9B5E00;
      font-weight: 900;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .footer {
      text-align: center;
      color: #789;
      font-weight: 800;
      font-size: 13px;
      margin-top: 26px;
    }
    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 1080px);
        padding-top: 18px;
      }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        margin-bottom: 16px;
      }
      .brand img { height: 30px; }
      .tag { font-size: 13px; }
      .hero {
        padding: 26px 20px;
        border-radius: 22px;
      }
      .query-card, .result-card, .form-card {
        padding: 20px;
        border-radius: 22px;
      }
      .query-grid {
        grid-template-columns: 1fr;
      }
      button {
        width: 100%;
      }
      .ghost-btn {
        width: auto;
      }
      .success-head {
        align-items: flex-start;
      }
      .check {
        width: 42px;
        height: 42px;
      }
      .profile {
        grid-template-columns: 1fr;
      }
      .session-grid {
        grid-template-columns: 1fr;
      }
      .info-row {
        grid-template-columns: 62px 1fr;
      }
      .form-head {
        flex-direction: column;
      }
      textarea {
        min-height: 150px;
      }
    }

    .lookup-actions {
      margin-top: 4px;
      justify-content: flex-start;
    }

    .lookup-actions button {
      min-width: 180px;
    }

    @media (max-width: 640px) {
      .lookup-actions button {
        width: 100%;
      }
    }

  
    /* 手機精簡版 */
    .hero { padding: 20px 24px; margin-bottom: 14px; }
    .hero .eyebrow { margin-bottom: 6px; font-size: 12px; }
    .hero h1 { font-size: clamp(24px, 5vw, 34px); line-height: 1.2; }
    .hero p { margin-top: 8px; font-size: 14px; line-height: 1.55; }
    .query-card { padding: 22px; }
    .query-card .field + .field { margin-top: 16px; }
    .lookup-actions { margin-top: 18px; }
    .lookup-actions button { width: 100%; }
    .query-card .hint { display: none; }
    .form-head p, #sessionInfoSection .form-head p { display: none; }
    .form-head { margin-bottom: 14px; }
    .form-head h2 { font-size: 24px; }
    @media (max-width: 760px) {
      .page { width: min(100% - 18px, 1080px); padding-top: 12px; }
      .topbar { margin-bottom: 10px; }
      .hero { padding: 18px 18px; border-radius: 18px; }
      .hero::before, .hero::after { display: none; }
      .hero h1 { font-size: 25px; }
      .hero p { font-size: 13px; line-height: 1.5; }
      .query-card, .result-card, .form-card { padding: 18px; border-radius: 18px; margin-top: 12px; }
      input, select, textarea { font-size: 16px; border-radius: 14px; padding: 14px; }
      .field label { font-size: 16px; }
      .success-title { font-size: 25px; }
      .success-sub { font-size: 15px; }
      .form-head h2 { font-size: 22px; }
      textarea { min-height: 130px; }
    }

  </style>
</head>

          "教練式領導與信任建立：在壓力中建立團隊信任、賦能與成長",
          "成長心態與協作文化：從微軟經驗看高成長團隊如何持續進化",
          "AI時代的領導提醒：主管如何保有學習力與組織彈性"
        ]
      },
      "2026-11-11": {
        date: "2026/11/11（三）下午",
        time: "13:30–16:30",
        place: "高雄明誠大樓 12樓",
        city: "高雄場",
        speaker: "陳慧蓉",
        title: "前台灣微軟首席營運長｜映光領導力教練工作室創辦人",
        pillar: "教練引導力",
        topic: "教練引導力",
        intro: "現任映光領導力教練工作室創辦人、商周百億CEO班教練顧問。從跨國企業管理看高目標團隊帶領，以教練式引導建立信任、激發潛能，並運用成長心態與協作文化推動團隊進化。",
        outline: [
          "從管理績效到成就他人：主管如何將目標轉化為團隊前進動能",
          "教練式領導與信任建立：在壓力中建立團隊信任、賦能與成長",
          "成長心態與協作文化：從微軟經驗看高成長團隊如何持續進化",
          "AI時代的領導提醒：主管如何保有學習力與組織彈性"
        ]
      }
    };

    const regionLookup = document.getElementById("regionLookup");
    const personLookup = document.getElementById("personLookup");
    const lookupBtn = document.getElementById("lookupBtn");
    const lookupMessage = document.getElementById("lookupMessage");
    const resultCard = document.getElementById("resultCard");
    const surveySection = document.getElementById("surveySection");
    const sessionInfoSection = document.getElementById("sessionInfoSection");
    const sessionGrid = document.getElementById("sessionGrid");
    const successTitle = document.getElementById("successTitle");
    const successSub = document.getElementById("successSub");
    const form = document.getElementById("surveyForm");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    let selectedRecord = null;
    const REGION_ORDER = ["北一", "北二", "桃竹", "中嘉", "台南", "高屏"];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function sessionLabel(code) {
      const s = SESSION_INFO[code];
      return s ? `${s.date}｜${s.city}｜${s.speaker}` : code;
    }

    function setMessage(message, type = "warn") {
      lookupMessage.textContent = message;
      lookupMessage.className = "lookup-message " + type;
    }

    function clearMessage() {
      lookupMessage.textContent = "";
      lookupMessage.className = "lookup-message";
    }

    function sortRegions(regions) {
      return regions.sort((a, b) => {
        const ai = REGION_ORDER.indexOf(a);
        const bi = REGION_ORDER.indexOf(b);
        if (ai !== -1 || bi !== -1) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        return a.localeCompare(b, "zh-Hant");
      });
    }

    function setSelectOptions(select, placeholder, values) {
      select.innerHTML = "";
      const first = document.createElement("option");
      first.value = "";
      first.textContent = placeholder;
      select.appendChild(first);

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function populateRegionList() {
      const regions = sortRegions([...new Set(REGISTRATIONS.map(r => r.region).filter(Boolean))]);
      regions.forEach(region => {
        const option = document.createElement("option");
        option.value = region;
        option.textContent = region;
        regionLookup.appendChild(option);
      });
    }

    function populatePersonList(region = "") {
      personLookup.innerHTML = "";
      const first = document.createElement("option");
      first.value = "";
      first.textContent = region ? "請選擇通訊處｜處經理姓名" : "請先選擇所屬地區";
      personLookup.appendChild(first);

      const records = REGISTRATIONS
        .filter(item => item.region === region)
        .sort((a, b) => a.office.localeCompare(b.office, "zh-Hant") || a.name.localeCompare(b.name, "zh-Hant"));

      records.forEach((record, index) => {
        const option = document.createElement("option");
        option.value = `${record.region}|||${record.office}|||${record.name}`;
        option.textContent = `${record.office}｜${record.name}`;
        personLookup.appendChild(option);
      });
      personLookup.disabled = !region;
    }

    function findRecord() {
      if (!personLookup.value) return null;
      const [region, office, name] = personLookup.value.split("|||");
      return REGISTRATIONS.find(record =>
        record.region === region && record.office === office && record.name === name
      ) || null;
    }

    function renderSessionCards(record) {
      sessionGrid.innerHTML = "";

      record.sessions.forEach(code => {
        const s = SESSION_INFO[code];
        if (!s) return;

        const outlineHtml = s.outline
          .map(item => `<li>${escapeHtml(item)}</li>`)
          .join("");

        const card = document.createElement("article");
        card.className = "session-card";
        card.innerHTML = `
          <div class="session-top">
            <div class="pill">${escapeHtml(s.city)}｜${escapeHtml(s.pillar)}</div>
            <h3>${escapeHtml(s.speaker)}</h3>
            <p class="session-topic">${escapeHtml(s.topic)}</p>
          </div>
          <div class="session-body">
            <div class="info-row"><div class="info-key">職稱</div><div class="info-val">${escapeHtml(s.title)}</div></div>
            <div class="info-row"><div class="info-key">日期</div><div class="info-val">${escapeHtml(s.date)}</div></div>
            <div class="info-row"><div class="info-key">時間</div><div class="info-val">${escapeHtml(s.time)}</div></div>
            <div class="info-row"><div class="info-key">地點</div><div class="info-val">${escapeHtml(s.place)}</div></div>
            <div class="section-title">講師背景</div>
            <p class="intro">${escapeHtml(s.intro)}</p>
            <div class="section-title">講題大綱</div>
            <ul class="outline">${outlineHtml}</ul>
          </div>
        `;
        sessionGrid.appendChild(card);
      });
    }

    function renderRecord(record) {
      selectedRecord = record;
      clearMessage();

      resultCard.classList.remove("hidden");

      if (!record.sessions || record.sessions.length === 0) {
        successTitle.textContent = `${record.name} 處經理您好`;
        successSub.textContent = "目前報名資料顯示為不克出席；如需調整，請洽承辦人員。";
        surveySection.classList.add("hidden");
        sessionInfoSection.classList.add("hidden");
        resultCard.scrollIntoView({ behavior: "smooth", block: "start" });
        return;
      }

      successTitle.textContent = `歡迎您，${record.name} 處經理！恭喜您報名成功`;
      successSub.innerHTML = record.sessions
        .map(code => escapeHtml(sessionLabel(code)))
        .join("<br>");

      renderSessionCards(record);

      surveySection.classList.remove("hidden");
      sessionInfoSection.classList.remove("hidden");
      statusEl.textContent = "";
      statusEl.className = "status";
      resultCard.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function handleLookup() {
      clearMessage();
      resetLookupView();

      if (!regionLookup.value) {
        setMessage("請先選擇所屬地區。");
        return;
      }
      if (!personLookup.value) {
        setMessage("請選擇您的通訊處與處經理姓名。");
        return;
      }

      const record = findRecord();
      if (!record) {
        setMessage("查無符合的報名資料，請重新選擇或洽承辦人員。");
        return;
      }
      renderRecord(record);
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = "status " + type;
    }

    function resetLookupView() {
      resultCard.classList.add("hidden");
      surveySection.classList.add("hidden");
      sessionInfoSection.classList.add("hidden");
      sessionGrid.innerHTML = "";
      selectedRecord = null;
    }

    regionLookup.addEventListener("change", () => {
      populatePersonList(regionLookup.value);
      personLookup.value = "";
      clearMessage();
      resetLookupView();
    });

    personLookup.addEventListener("change", () => {
      clearMessage();
      resetLookupView();
    });

    lookupBtn.addEventListener("click", handleLookup);

    form.addEventListener("submit", async event => {
      event.preventDefault();
      if (!selectedRecord || !selectedRecord.sessions || selectedRecord.sessions.length === 0) {
        setStatus("請先查詢並確認報名場次。", "warn");
        return;
      }
      if (!form.reportValidity()) return;

      const payload = {
        office: selectedRecord.office,
        managerName: selectedRecord.name,
        region: selectedRecord.region,
        response: selectedRecord.response,
        sessions: selectedRecord.sessions.map(sessionLabel).join("；"),
        sessionCodes: selectedRecord.sessions.join(","),
        expectation: document.getElementById("expectation").value.trim(),
        qaQuestion: document.getElementById("qaQuestion").value.trim(),
        submittedAt: new Date().toISOString(),
        source: "K PLUS CEO講堂課前問卷"
      };

      if (!FORM_ENDPOINT) {
        console.log("問卷資料預覽：", payload);
        setStatus("目前尚未串接後台，資料不會集中儲存。請先設定 FORM_ENDPOINT。", "warn");
        return;
      }

      submitBtn.disabled = true;
      setStatus("送出中，請稍候…");

      try {
        await fetch(FORM_ENDPOINT, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        form.reset();
        setStatus("已完成送出，謝謝您的填寫。", "ok");
      } catch (error) {
        console.error(error);
        setStatus("送出時發生問題，請稍後再試或聯繫承辦人員。", "warn");
      } finally {
        submitBtn.disabled = false;
      }
    });

    populateRegionList();
    populateOfficeList();
    populateNameList();
  </script>
</body>
</html>
